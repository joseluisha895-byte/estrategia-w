<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opciones — Estrategia W</title>

  <!-- ========================================================
       FUENTES EXTERNAS (Google Fonts)
       Mismas que el resto del juego para coherencia visual.
  ======================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <!-- ========================================================
       HOJA DE ESTILOS
       Archivo: opciones.css (en esta misma carpeta)
  ======================================================== -->
  <link rel="stylesheet" href="opciones.css" />
</head>
<body>

  <!-- ========================================================
       CANVAS DEL FONDO ANIMADO
       Seleccionado en opciones.js con getElementById('bg')
       Estilizado en opciones.css (canvas#bg)
  ======================================================== -->
  <canvas id="bg"></canvas>

  <!-- ========================================================
       CONTENEDOR PRINCIPAL
       Clase .stage → estilos en opciones.css
  ======================================================== -->
  <div class="stage">

    <!-- Ornamento decorativo superior -->
    <div class="ornament" aria-hidden="true">
      <div class="ornament-line flip"></div>
      <svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9H22L16 13.5L18.5 21L12 16.5L5.5 21L8 13.5L2 9H9.5Z"/></svg>
      <div class="ornament-line"></div>
    </div>

    <!-- Título de la pantalla -->
    <div class="title-wrap">
      <p class="subtitle">Estrategia W</p>
      <h1>Opciones</h1>
    </div>

    <div class="sep" aria-hidden="true"></div>

    <!-- ======================================================
         PANEL DE MANTENIMIENTO
         Por ahora solo muestra el mensaje "En Mantenimiento".
         Aquí se agregarán los controles de opciones en el futuro
         (audio, gráficos, controles, idioma, etc.)
    ====================================================== -->
    <div class="panel">

      <!-- Ícono decorativo de engranaje -->
      <div class="icono-mantenimiento" aria-hidden="true">⚙</div>

      <!-- Mensaje principal de mantenimiento -->
      <p class="msg-titulo">En Mantenimiento</p>

      <!-- Mensaje secundario -->
      <p class="msg-sub">Esta sección estará disponible próximamente.</p>

      <div class="sep-panel" aria-hidden="true"></div>

      <!-- Botón para regresar al menú principal
           onclick llama a regresar() definida en opciones.js -->
      <button class="btn" onclick="regresar()">
        <span class="arrow">◀</span>Regresar
      </button>

    </div><!-- /.panel -->

    <p class="version">v0.1 — Alpha</p>

  </div><!-- /.stage -->

  <!-- ========================================================
       SCRIPT DE ESTA PANTALLA
       Archivo: opciones.js (en esta misma carpeta)
       Por ahora solo maneja: fondo animado y regresar()
       Se carga al final del body para que el DOM ya exista.
  ======================================================== -->
  <script src="opciones.js"></script>

</body>
</html>
