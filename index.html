<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estrategia W</title>

  <!-- ========================================================
       FUENTES EXTERNAS (Google Fonts)
       Cinzel Decorative → usada en el <h1> del título
       Cinzel            → usada en botones, subtítulo, versión
       Referenciadas en: menu.css (font-family declarations)
  ======================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <!-- ========================================================
       HOJA DE ESTILOS PRINCIPAL
       Archivo: menu.css
       Contiene: variables de color, animaciones, layout,
                 estilos del panel y botones del menú.
  ======================================================== -->
  <link rel="stylesheet" href="menu.css" />
</head>
<body>

  <!-- ========================================================
       CANVAS DEL FONDO ANIMADO
       - El elemento <canvas id="bg"> es seleccionado en menu.js
         mediante: document.getElementById('bg')
       - Su tamaño y el dibujo de hexágonos lo maneja menu.js
       - Su posición y opacidad están definidas en menu.css (#bg / canvas#bg)
  ======================================================== -->
  <canvas id="bg"></canvas>

  <!-- ========================================================
       CONTENEDOR PRINCIPAL DEL MENÚ
       Clase .stage → estilos en menu.css
       Contiene todos los elementos visibles del menú de inicio.
  ======================================================== -->
  <div class="stage">

    <!-- Ornamento decorativo superior (líneas + estrella SVG)
         Clase .ornament → estilos en menu.css
         aria-hidden="true" porque es puramente decorativo -->
    <div class="ornament" aria-hidden="true">
      <div class="ornament-line flip"></div>
      <svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9H22L16 13.5L18.5 21L12 16.5L5.5 21L8 13.5L2 9H9.5Z"/></svg>
      <div class="ornament-line"></div>
    </div>

    <!-- Bloque de título del juego
         .subtitle → texto pequeño sobre el título
         h1        → nombre principal "Estrategia W"
         Estilos en menu.css (.title-wrap, .subtitle, h1) -->
    <div class="title-wrap">
      <p class="subtitle">El Gran Tablero</p>
      <h1>Estrategia&nbsp;W</h1>
    </div>

    <!-- Línea separadora decorativa
         Clase .sep → estilos en menu.css
         aria-hidden porque es decorativa -->
    <div class="sep" aria-hidden="true"></div>

    <!-- ======================================================
         PANEL DE NAVEGACIÓN - MENÚ PRINCIPAL
         Cada botón llama a la función accion() definida en menu.js
         El parámetro string ('nuevo', 'cargar', 'opciones')
         determina qué pantalla se cargará en el futuro.

         Clases:
           .menu-panel → contenedor del panel  (menu.css)
           .btn        → estilo base de botón  (menu.css)
           .btn-primary→ variante destacada    (menu.css)
           .arrow      → flecha animada hover  (menu.css)

         onclick="accion('...')" → función en menu.js
    ====================================================== -->
    <nav class="menu-panel" role="navigation" aria-label="Menú principal">

      <!-- Botón: Nuevo Juego
           accion('nuevo') en menu.js → aquí irá la lógica para
           iniciar una partida nueva (mapa, configuración, etc.) -->
      <button class="btn btn-primary" onclick="accion('nuevo')">
        <span class="arrow">▶</span>Nuevo Juego
      </button>

      <!-- Botón: Cargar Partida
           accion('cargar') en menu.js → aquí irá la lógica para
           leer partidas guardadas (localStorage o servidor) -->
      <button class="btn" onclick="accion('cargar')">
        <span class="arrow">▶</span>Cargar Partida
      </button>

      <!-- Botón: Opciones
           accion('opciones') en menu.js → aquí irá el panel de
           configuración (audio, gráficos, controles, etc.) -->
      <button class="btn" onclick="accion('opciones')">
        <span class="arrow">▶</span>Opciones
      </button>

    </nav>

    <!-- Etiqueta de versión del juego
         Clase .version → estilos en menu.css
         Actualizar manualmente al subir versiones -->
    <p class="version">v0.1 — Alpha</p>

  </div><!-- /.stage -->

  <!-- ========================================================
       SCRIPT PRINCIPAL DEL MENÚ
       Archivo: menu.js
       Contiene:
         - Animación del fondo hexagonal (canvas #bg)
         - Función accion() que responde a los botones del menú
       Se carga al final del body para que el DOM ya exista.
  ======================================================== -->
  <script src="menu.js"></script>

</body>
</html>
