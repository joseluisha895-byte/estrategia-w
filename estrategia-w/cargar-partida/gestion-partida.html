<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Partida — Estrategia W</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />

  <!-- ========================================================
       HOJA DE ESTILOS
       Archivo: gestion-partida.css (en esta misma carpeta /cargar-partida/)
  ======================================================== -->
  <link rel="stylesheet" href="gestion-partida.css" />
</head>
<body>

  <canvas id="bg"></canvas>

  <div class="stage">

    <!-- CABECERA -->
    <header class="cabecera">
      <div class="cabecera-left">
        <!-- Regresa a la lista de partidas guardadas
             onclick → regresar() en gestion-partida.js -->
        <button class="btn-volver" onclick="regresar()">◀ Volver</button>
      </div>

      <div class="cabecera-center">
        <p class="cabecera-sub">Estrategia W</p>
        <h1 class="cabecera-titulo">Gestión de Partida</h1>
      </div>

      <!-- Nombre + fecha de la partida cargada
           Rellenado por gestion-partida.js → init()
           id="partida-label" / id="partida-fecha" → gestion-partida.js -->
      <div class="cabecera-right">
        <div class="partida-badge">
          <span class="partida-badge-label">Partida</span>
          <span class="partida-badge-nombre" id="partida-label">—</span>
          <span class="partida-badge-fecha" id="partida-fecha">—</span>
        </div>
      </div>
    </header>

    <!-- CUERPO: misma estructura de dos columnas que seleccion-mods -->
    <main class="cuerpo">

      <!-- ====================================================
           COLUMNA IZQUIERDA — Lista de mods
      ==================================================== -->
      <section class="col-lista">
        <div class="lista-header">
          <span class="lista-titulo">Mods de esta Partida</span>
          <span class="lista-contador" id="contador-mods">0 activos</span>
        </div>
        <div class="lista-mods" id="lista-mods">
          <!-- Generado por gestion-partida.js con los mods guardados -->
        </div>
      </section>

      <!-- ====================================================
           COLUMNA DERECHA — Detalle del mod + acciones peligrosas
      ==================================================== -->
      <section class="col-detalle" id="col-detalle">

        <!-- Estado vacío -->
        <div class="detalle-vacio" id="detalle-vacio">
          <div class="detalle-vacio-icono">⚙</div>
          <p class="detalle-vacio-texto">Selecciona un mod<br>para ver su descripción</p>
        </div>

        <!-- Detalle del mod (oculto hasta seleccionar)
             Rellenado por gestion-partida.js → verDetalle() -->
        <div class="detalle-contenido" id="detalle-contenido" style="display:none">

          <div class="det-thumbnail-wrap">
            <img class="det-thumbnail" id="det-thumbnail" src="" alt="" />
            <span class="det-badge-req" id="det-badge-req" style="display:none">Requerido</span>
          </div>

          <div class="det-header">
            <h2 class="det-nombre" id="det-nombre">—</h2>
            <span class="det-version" id="det-version">v0.0</span>
          </div>

          <p class="det-autor" id="det-autor">—</p>
          <div class="det-etiquetas" id="det-etiquetas"></div>
          <div class="det-sep" aria-hidden="true"></div>
          <p class="det-descripcion" id="det-descripcion">—</p>

          <div class="det-deps" id="det-deps-wrap" style="display:none">
            <span class="det-deps-label">Requiere:</span>
            <span class="det-deps-lista" id="det-deps-lista"></span>
          </div>

          <!-- Botón toggle: activar/desactivar mod en esta partida
               onclick → toggleMod() en gestion-partida.js -->
          <button class="btn-toggle" id="btn-toggle" onclick="toggleMod()">
            Activar Mod
          </button>

        </div><!-- /.detalle-contenido -->

        <!-- ================================================
             ZONA DE PELIGRO — Eliminar partida
             Separada visualmente del resto.
             onclick → eliminarPartida() en gestion-partida.js
        ================================================ -->
        <div class="zona-peligro">
          <div class="zona-peligro-sep" aria-hidden="true"></div>
          <p class="zona-peligro-label">Zona de Peligro</p>
          <button class="btn-eliminar-partida" onclick="eliminarPartida()">
            🗑 Eliminar esta Partida
          </button>
          <p class="zona-peligro-aviso">Esta acción no se puede deshacer.</p>
        </div>

      </section>

    </main>

    <!-- PIE — Selector de tamaño + botón jugar -->
    <footer class="pie">

      <!-- Selector de tamaño del mundo (mismo que en seleccion-mods) -->
      <div class="tamano-wrap">
        <span class="tamano-label">Tamaño del Mundo</span>
        <div class="tamano-opciones">

          <button class="tamano-btn" id="tam-pequeno"
                  onclick="elegirTamano('pequeno')"
                  title="~200 hexágonos">
            <span class="tamano-icono">◈</span>
            <span class="tamano-nombre">Pequeño</span>
          </button>

          <button class="tamano-btn" id="tam-mediano"
                  onclick="elegirTamano('mediano')"
                  title="~500 hexágonos">
            <span class="tamano-icono">◈◈</span>
            <span class="tamano-nombre">Mediano</span>
          </button>

          <button class="tamano-btn" id="tam-grande"
                  onclick="elegirTamano('grande')"
                  title="~1000 hexágonos">
            <span class="tamano-icono">◈◈◈</span>
            <span class="tamano-nombre">Grande</span>
          </button>

        </div>
      </div>

      <div class="pie-derecha">
        <p class="pie-hint" id="pie-hint">Cargando partida…</p>
        <!-- Continúa al juego con los mods y tamaño guardados
             onclick → iniciarJuego() en gestion-partida.js -->
        <button class="btn-jugar" id="btn-jugar" onclick="iniciarJuego()" disabled>
          <span>⚔ Continuar Partida</span>
        </button>
      </div>

    </footer>

  </div><!-- /.stage -->

  <!-- ========================================================
       SCRIPT
       Archivo: gestion-partida.js (en esta misma carpeta)
       Lee 'ew_partida_actual' de localStorage (escrita por cargar-partida.js)
  ======================================================== -->
  <script src="gestion-partida.js"></script>

</body>
</html>
