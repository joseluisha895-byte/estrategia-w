<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cargar Partida — Estrategia W</title>

  <!-- ========================================================
       FUENTES EXTERNAS (Google Fonts)
       Mismas que index.html y nueva-partida.html
  ======================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <!-- ========================================================
       HOJA DE ESTILOS
       Archivo: cargar-partida.css (en esta misma carpeta)
  ======================================================== -->
  <link rel="stylesheet" href="cargar-partida.css" />
</head>
<body>

  <!-- ========================================================
       CANVAS DEL FONDO ANIMADO
       Seleccionado en cargar-partida.js con getElementById('bg')
       Estilizado en cargar-partida.css (canvas#bg)
  ======================================================== -->
  <canvas id="bg"></canvas>

  <!-- ========================================================
       CONTENEDOR PRINCIPAL
       Clase .stage → estilos en cargar-partida.css
  ======================================================== -->
  <div class="stage">

    <!-- Ornamento decorativo superior -->
    <div class="ornament" aria-hidden="true">
      <div class="ornament-line flip"></div>
      <svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9H22L16 13.5L18.5 21L12 16.5L5.5 21L8 13.5L2 9H9.5Z"/></svg>
      <div class="ornament-line"></div>
    </div>

    <!-- Título de la pantalla -->
    <div class="title-wrap">
      <p class="subtitle">Estrategia W</p>
      <h1>Cargar Partida</h1>
    </div>

    <div class="sep" aria-hidden="true"></div>

    <!-- ======================================================
         PANEL PRINCIPAL
         Contiene la lista de partidas guardadas y los botones.
         La lista se genera dinámicamente en cargar-partida.js
    ====================================================== -->
    <div class="panel">

      <!-- ====================================================
           LISTA DE PARTIDAS GUARDADAS
           Este <ul> es vaciado y repoblado por cargar-partida.js
           cada vez que se carga la página.
           id="lista-partidas" → referenciado en cargar-partida.js

           Cada <li> que genera el JS tiene clase .partida-item
           y al hacer click llama a seleccionar(id) en cargar-partida.js
      ==================================================== -->
      <div class="lista-wrap">
        <p class="lista-label">Partidas Guardadas</p>
        <ul id="lista-partidas" class="lista-partidas">
          <!-- Generado dinámicamente por cargar-partida.js -->
        </ul>
        <!-- Mensaje cuando no hay partidas guardadas -->
        <p id="lista-vacia" class="lista-vacia" style="display:none">
          No hay partidas guardadas. Crea una en "Nuevo Juego".
        </p>
      </div>

      <!-- ====================================================
           BOTONES DE ACCIÓN
           Se activan solo cuando hay una partida seleccionada.
           cargar-partida.js los habilita al hacer click en un item.
             jugar()    → navega al juego con la partida seleccionada
             eliminar() → borra la partida seleccionada del localStorage
             regresar() → vuelve al menú principal (index.html)
      ==================================================== -->
      <div class="btn-group">

        <!-- Carga y entra a la partida seleccionada -->
        <button class="btn btn-play" id="btn-jugar" onclick="jugar()" disabled>
          <span class="arrow">▶</span>Jugar
        </button>

        <!-- Borra la partida seleccionada del localStorage -->
        <button class="btn btn-danger" id="btn-eliminar" onclick="eliminar()" disabled>
          <span class="arrow">▶</span>Eliminar
        </button>

        <!-- Vuelve al menú principal sin hacer nada -->
        <button class="btn" onclick="regresar()">
          <span class="arrow">◀</span>Regresar
        </button>

      </div>

      <!-- Mensaje de estado (éxito / error de operaciones)
           Controlado por cargar-partida.js mediante id="accion-msg" -->
      <p class="accion-msg" id="accion-msg"></p>

    </div><!-- /.panel -->

    <p class="version">v0.1 — Alpha</p>

  </div><!-- /.stage -->

  <!-- ========================================================
       SCRIPT DE ESTA PANTALLA
       Archivo: cargar-partida.js (en esta misma carpeta)
       Lee 'ew_partidas' de localStorage (escrita por nueva-partida.js)
       Maneja: selección de partida, jugar, eliminar, regresar.
       Se carga al final del body para que el DOM ya exista.
  ======================================================== -->
  <script src="cargar-partida.js"></script>

</body>
</html>
