<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estrategia W</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="juego.css" />
</head>
<body>

  <!-- HUD SUPERIOR
       Datos rellenados por juego.js → cargarSesion() -->
  <header class="hud" id="hud">

    <div class="hud-bloque">
      <span class="hud-label">Partida</span>
      <span class="hud-valor" id="hud-nombre">—</span>
    </div>

    <div class="hud-sep"></div>

    <!-- Los recursos se inyectan aquí por juego.js según mods activos
         id="hud-recursos" → juego.js -->
    <div class="hud-recursos" id="hud-recursos"></div>

    <div class="hud-sep"></div>

    <div class="hud-bloque hud-bloque-mundo">
      <span class="hud-label">Mundo</span>
      <span class="hud-valor" id="hud-mundo">—</span>
    </div>

    <div class="hud-acciones">
      <!-- onclick → funciones en juego.js -->
      <button class="hud-btn" onclick="guardarPartida()" title="Guardar">💾</button>
      <button class="hud-btn hud-btn-salir" onclick="salirAlMenu()" title="Menú">⚔</button>
    </div>

  </header>

  <!-- CANVAS 3D — Three.js renderiza aquí la esfera
       id="mundo-canvas" → Renderer.init() en juego.js -->
  <canvas id="mundo-canvas"></canvas>

  <!-- PANEL DE INFO — Al clickear un hexágono
       Mostrado/ocultado por juego.js → abrirPanel() / cerrarPanel() -->
  <div class="panel-info" id="panel-info" style="display:none">
    <button class="panel-cerrar" onclick="cerrarPanel()">✕</button>
    <div class="panel-inner">
      <p class="panel-subtitulo" id="panel-terreno">Terreno</p>
      <p class="panel-coords"   id="panel-coords">(q, r)</p>
      <div class="panel-sep"></div>
      <!-- Contenido dinámico: mods inyectan info aquí
           id="panel-contenido" → juego.js y mods -->
      <div class="panel-contenido" id="panel-contenido">
        <p class="panel-vacio">Hexágono vacío</p>
      </div>
    </div>
  </div>

  <!-- Overlay semitransparente detrás del panel -->
  <div class="overlay" id="overlay" onclick="cerrarPanel()" style="display:none"></div>

  <!-- Notificación de guardado
       id="notif-guardado" → juego.js → mostrarNotif() -->
  <div class="notif-guardado" id="notif-guardado" style="display:none">
    ✔ Partida guardada
  </div>

  <!-- SCRIPTS — Orden obligatorio:
       1. Three.js (CDN)
       2. core/world-gen.js
       3. core/renderer.js
       4. juego.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="../core/world-gen.js"></script>
  <script src="../core/renderer.js"></script>
  <script src="juego.js"></script>

</body>
</html>
