<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva Partida — Estrategia W</title>

  <!-- ========================================================
       FUENTES EXTERNAS (Google Fonts)
       Las mismas que usa index.html para mantener coherencia visual.
  ======================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <!-- ========================================================
       HOJA DE ESTILOS
       Archivo: nueva-partida.css (en esta misma carpeta)
  ======================================================== -->
  <link rel="stylesheet" href="nueva-partida.css" />
</head>
<body>

  <!-- ========================================================
       CANVAS DEL FONDO ANIMADO
       Seleccionado en nueva-partida.js con getElementById('bg')
       Estilizado en nueva-partida.css (canvas#bg)
  ======================================================== -->
  <canvas id="bg"></canvas>

  <!-- ========================================================
       CONTENEDOR PRINCIPAL
       Clase .stage → estilos en nueva-partida.css
  ======================================================== -->
  <div class="stage">

    <!-- Ornamento decorativo superior -->
    <div class="ornament" aria-hidden="true">
      <div class="ornament-line flip"></div>
      <svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9H22L16 13.5L18.5 21L12 16.5L5.5 21L8 13.5L2 9H9.5Z"/></svg>
      <div class="ornament-line"></div>
    </div>

    <!-- Título de la pantalla -->
    <div class="title-wrap">
      <p class="subtitle">Estrategia W</p>
      <h1>Nueva Partida</h1>
    </div>

    <div class="sep" aria-hidden="true"></div>

    <!-- ======================================================
         PANEL PRINCIPAL
         Contiene el campo de nombre y los botones de acción.
         Toda la lógica de los botones está en nueva-partida.js
    ====================================================== -->
    <div class="panel">

      <!-- Campo de nombre de la partida
           El valor de este input es leído por nueva-partida.js
           en las funciones guardar() y jugar()
           id="nombre-partida" → referenciado en nueva-partida.js -->
      <div class="field-group">
        <label for="nombre-partida" class="field-label">Nombre de la Partida</label>
        <input
          type="text"
          id="nombre-partida"
          class="field-input"
          placeholder="Ej: Campaña del Norte…"
          maxlength="40"
          autocomplete="off"
        />
        <!-- Mensaje de error/estado que muestra nueva-partida.js -->
        <p class="field-msg" id="field-msg"></p>
      </div>

      <!-- ====================================================
           BOTONES DE ACCIÓN
           Cada onclick llama a una función de nueva-partida.js:
             guardar()  → guarda la partida en localStorage
             jugar()    → guarda (si hay nombre) y entra al juego
             eliminar() → borra la partida de localStorage
             regresar() → vuelve al menú principal (index.html)
      ==================================================== -->
      <div class="btn-group">

        <!-- Guarda el nombre de la partida sin salir de la pantalla -->
        <button class="btn btn-primary" onclick="guardar()">
          <span class="arrow">▶</span>Guardar
        </button>

        <!-- Guarda y navega a la partida (pantalla de juego futura) -->
        <button class="btn btn-play" onclick="jugar()">
          <span class="arrow">▶</span>Jugar
        </button>

        <!-- Vuelve al menú principal sin guardar -->
        <button class="btn" onclick="regresar()">
          <span class="arrow">◀</span>Regresar
        </button>

      </div>
    </div><!-- /.panel -->

    <p class="version">v0.1 — Alpha</p>

  </div><!-- /.stage -->

  <!-- ========================================================
       SCRIPT DE ESTA PANTALLA
       Archivo: nueva-partida.js (en esta misma carpeta)
       Maneja: guardar, jugar, eliminar, regresar
       Almacenamiento: localStorage (clave 'ew_partidas')
       Se carga al final del body para que el DOM ya exista.
  ======================================================== -->
  <script src="nueva-partida.js"></script>

</body>
</html>
